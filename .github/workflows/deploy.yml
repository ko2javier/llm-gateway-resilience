name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/ko2javier/llm-gateway-resilience:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            docker pull ghcr.io/ko2javier/llm-gateway-resilience:latest
            docker stop llm-gateway 2>/dev/null || true
            docker rm llm-gateway 2>/dev/null || true
            docker run -d \
              --name llm-gateway \
              --restart unless-stopped \
              -p 8085:8085 \
              --env-file /opt/llm-gateway/.env \
              ghcr.io/ko2javier/llm-gateway-resilience:latest
